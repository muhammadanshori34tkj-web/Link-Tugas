<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gitulah pokoknya</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --card-bg: rgba(255, 255, 255, 0.07);
            --card-border: rgba(255, 255, 255, 0.15);
            --text-main: #ffffff;
            --text-muted: #b0c4de;
            --accent: #00d2ff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            padding: 40px 20px;
            background-attachment: fixed;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header { text-align: center; margin-bottom: 40px; }
        header h1 {
            font-size: 2.5rem;
            background: -webkit-linear-gradient(45deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .add-task-container {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--card-border);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 40px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        input {
            flex: 1; padding: 12px; border-radius: 8px; border: 1px solid var(--card-border);
            background: rgba(0, 0, 0, 0.2); color: white; outline: none;
        }

        button {
            padding: 12px 25px; border: none; border-radius: 8px;
            background: linear-gradient(45deg, #00d2ff, #3a7bd5);
            color: white; font-weight: 600; cursor: pointer; transition: 0.2s;
        }

        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }

        .card {
            background: var(--card-bg); backdrop-filter: blur(10px);
            border: 1px solid var(--card-border); border-radius: 15px; padding: 20px;
        }

        .card h3 { color: var(--accent); margin-bottom: 15px; border-bottom: 1px solid var(--card-border); padding-bottom: 5px; }

        .task-list { list-style: none; }
        .task-item {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.2); padding: 10px; border-radius: 8px; margin-bottom: 8px;
        }

        .task-link { color: white; text-decoration: none; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%; }
        .task-link:hover { color: var(--accent); }

        .delete-btn { background: transparent; color: #ff4757; font-size: 1.2rem; padding: 0 5px; box-shadow: none; }
        .delete-btn:hover { transform: scale(1.2); box-shadow: none; }

        @media (max-width: 600px) { .add-task-container { flex-direction: column; } }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Pencatatan Tugas</h1>
            <p>Data tersimpan di adadeh pokoknya</p>
        </header>

        <div class="add-task-container">
            <input type="text" id="mapel" placeholder="Mata Pelajaran...">
            <input type="text" id="judul" placeholder="Judul Tugas...">
            <input type="text" id="link" placeholder="Link (URL)...">
            <button onclick="addTask()">+ Tambah</button>
        </div>

        <div class="grid" id="board">
            <p style="text-align:center; grid-column: 1/-1;">Menghubungkan ke database...</p>
        </div>
    </div>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = 'https://cuqffdprizrmlesivhhs.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImN1cWZmZHByaXpybWxlc2l2aGhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjE4NjgsImV4cCI6MjA5Mjg5Nzg2OH0.NFIEbTp34Owm6zlPqt9IamVvZUEMe95MggBB9He3HHg';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Fungsi Ambil Data
        async function renderTasks() {
            const board = document.getElementById('board');
            
            const { data: tasks, error } = await _supabase
                .from('tasks')
                .select('*'); // Cukup select bintang aja

            if (error) {
                board.innerHTML = `<p style="color:red">Error: ${error.message}</p>`;
                return;
            }

            const grouped = tasks.reduce((acc, task) => {
                if (!acc[task.mapel]) acc[task.mapel] = [];
                acc[task.mapel].push(task);
                return acc;
            }, {});

            board.innerHTML = '';
            for (const mapel in grouped) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h3>${mapel}</h3><ul class="task-list"></ul>`;
                
                const ul = card.querySelector('ul');
                grouped[mapel].forEach(t => {
                    const li = document.createElement('li');
                    li.className = 'task-item';
                    li.innerHTML = `
                        <a href="${t.link}" target="_blank" class="task-link">${t.judul}</a>
                        <button class="delete-btn" onclick="deleteTask(${t.id})">✖</button>
                    `;
                    ul.appendChild(li);
                });
                board.appendChild(card);
            }
            if (tasks.length === 0) board.innerHTML = '<p style="text-align:center; grid-column:1/-1">Belum ada tugas.</p>';
        }

        // Fungsi Tambah Data
        async function addTask() {
            const mapel = document.getElementById('mapel').value.trim();
            const judul = document.getElementById('judul').value.trim();
            let link = document.getElementById('link').value.trim();

            if (!mapel || !judul || !link) return alert("Isi semua dulu!");
            if (!link.startsWith('http')) link = 'https://' + link;

            const { error } = await _supabase
                .from('tasks')
                .insert([{ mapel, judul, link }]);

            if (error) alert("Gagal: " + error.message);
            else {
                document.getElementById('judul').value = '';
                document.getElementById('link').value = '';
                renderTasks();
            }
        }

        // Fungsi Hapus Data
        async function deleteTask(id) {
            if (!confirm("Hapus tugas ini?")) return;
            const { error } = await _supabase.from('tasks').delete().eq('id', id);
            if (error) alert("Gagal hapus");
            else renderTasks();
        }

        renderTasks();
    </script>
</body>
</html>
